<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCat - Email Search Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>SmartCat</h1>
        <span class="status" id="status">Подключение...</span>
    </div>

    <div id="messages">
        <div class="message assistant">
            <div class="answer-text">Привет! Я SmartCat, ассистент по поиску email.
Спрашивай что угодно о корпусе Enron — я умею искать письма, находить людей, сделки и анализировать переписку.</div>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="query-input" placeholder="Задай вопрос о переписке..." autofocus>
        <button id="send-btn">Отправить</button>
    </div>

    <script src="chat.js"></script>
</body>
</html>
