<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCat - Email Search Agent</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="header">
        <h1>SmartCat</h1>
        <span class="status" id="status">Подключение...</span>
    </div>

    <div id="messages">
        <div id="welcome">
            <div class="welcome-emoji">&#128049;</div>
            <h2 class="welcome-title">SmartCat</h2>
            <p class="welcome-desc">
                AI-ассистент для поиска и анализа email-переписки.<br>
                245K писем Enron, гибридный поиск, 31K QA-пар.
            </p>
            <div class="welcome-sample" id="sample-question" onclick="useSample()">
                <div class="welcome-sample-label">Попробуй спросить:</div>
                <div class="welcome-sample-text" id="sample-text"></div>
            </div>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="query-input" placeholder="Задай вопрос о переписке..." autofocus>
        <button id="send-btn">Отправить</button>
    </div>

    <script src="chat.js"></script>
</body>
</html>
